server {
    listen 80;
    server_name _;

    # Serve the built React app
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Combined with the variable proxy_pass targets below,
    # this forces nginx to RE-RESOLVE backend hostnames per-request instead of
    # caching the IP at startup. Without it, recreating the n8n/sidecars container
    # (which gives it a new IP) makes nginx keep hitting the old IP → 502 until a
    # frontend restart. valid=10s keeps the lookup fresh.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # MIME fix: nginx's default mime.types has NO mapping for .mjs, so ES-module
    # assets (e.g. pdfjs' pdf.worker.mjs) are served as application/octet-stream,
    # which browsers REFUSE to load as a module worker → PDF CV upload throws
    # "Read failed". Force .mjs to be JavaScript. (A regex location takes
    # precedence over the SPA prefix location below, and still serves the file.)
    location ~ \.mjs$ {
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Hashed build assets never change → cache them hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — all unknown paths serve index.html. index.html itself must
    # NEVER be cached, or browsers (esp. phones) keep loading an old bundle after
    # a redeploy. no-store forces a re-fetch every time; the hashed assets above
    # stay cached, so only the tiny index.html is re-downloaded.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    # Proxy the Ollama host so the in-app service-health check works through a
    # tunnel/phone (same-origin). host.docker.internal resolves via extra_hosts
    # (see docker-compose frontend service); static proxy_pass = resolved at start.
    location /ollama/ {
        proxy_pass http://host.docker.internal:11434/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # Proxy n8n webhooks. The hostname is in a variable so nginx resolves it
    # per-request (via the resolver above) — survives n8n container recreation.
    location /webhook/ {
        set $n8n_host n8n;
        proxy_pass http://$n8n_host:5678;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50m;
    }

    # Proxy recording sidecar (variable host → per-request resolution)
    location /recording/ {
        set $sidecars_host sidecars;
        proxy_pass http://$sidecars_host:8903;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        client_max_body_size 200m;
    }

    # Proxy auth sidecar (variable host → per-request resolution)
    location /auth/ {
        set $auth_host sidecars;
        proxy_pass http://$auth_host:8904;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
