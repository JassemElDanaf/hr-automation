# Diyar HR — Docker Compose
# Usage:
#   1. cp .env.example .env  &&  edit .env  (fill in SMTP/IMAP creds)
#   2. docker compose up -d
#
# Ollama runs on the host (port 11434). Containers reach it via host.docker.internal.
# All data is persisted in named volumes; nothing is lost on restart.

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-hr_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-hr_automation}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-initdb:ro
      - ./scripts/docker-pg-init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hr_admin} -d ${POSTGRES_DB:-hr_automation}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ── n8n workflow engine ───────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    entrypoint: ["sh", "/n8n-entrypoint.sh"]
    environment:
      # n8n runtime
      N8N_USER_MANAGEMENT_DISABLED: "true"
      N8N_SKIP_OWNER_SETUP: "true"
      N8N_BASIC_AUTH_ACTIVE: "false"
      N8N_AUTH_EXCLUDE_ENDPOINTS: "*"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HOST: "0.0.0.0"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "http"
      WEBHOOK_URL: "http://n8n:5678/"
      # HR PostgreSQL credential overwrite (applied to ALL postgres-type credentials)
      DB_HOST:    postgres
      DB_PORT:    "5432"
      DB_NAME:    ${POSTGRES_DB:-hr_automation}
      DB_USER:    ${POSTGRES_USER:-hr_admin}
      DB_PASS:    ${POSTGRES_PASSWORD:-hr_pass}
      # Tenant company name baked into AI-generated content (JD/criteria) at import.
      # Single source of truth for the company — change in .env to rebrand.
      COMPANY_NAME: ${COMPANY_NAME:-Diyar United Company}
      # Fixed encryption key — must match what the entrypoint script uses to encrypt credentials
      N8N_ENCRYPTION_KEY: "diyar-hr-n8n-key-2026"
      # Owner account — auto-created on first boot, skips setup wizard
      N8N_OWNER_EMAIL: "admin@diyarme.com"
      N8N_OWNER_PASSWORD: "ChangeMe123!"
      N8N_OWNER_FIRST_NAME: "Admin"
      N8N_OWNER_LAST_NAME: "User"
      # Ollama host. Default = Ollama running on the HOST (reachable via
      # host.docker.internal). Set OLLAMA_DOCKER_HOST=ollama in .env to use the
      # bundled Docker Ollama service instead (run with: --profile ollama).
      OLLAMA_DOCKER_HOST: ${OLLAMA_DOCKER_HOST:-host.docker.internal}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro
      - ./scripts/n8n-entrypoint.sh:/n8n-entrypoint.sh:ro
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Ollama (always-on — the portable CPU fallback) ───────────────────────
  # Always started by `docker compose up -d`. It AUTO-PULLS qwen3:4b on first
  # boot (skipped if already present in the bind-mounted store), so a fresh
  # clone on any machine "just works" with no manual pull.
  #   • On a box WITH a host Ollama (e.g. GPU on Windows), n8n auto-detects and
  #     uses that for speed; this container just idles as a ready fallback.
  #   • On a box WITHOUT one (e.g. a fresh Ubuntu pull), n8n auto-detects nothing
  #     and uses THIS container (CPU). See scripts/n8n-entrypoint.sh.
  # No published port (11434) so it never conflicts with a host Ollama — n8n and
  # nginx reach it over the internal Docker network at ollama:11434.
  # Model files persist via the bind mount to OLLAMA_DATA_DIR (keep on D:).
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama serve & until ollama list >/dev/null 2>&1; do sleep 1; done; ollama list | grep -qi qwen3 || ollama pull qwen3:4b; wait"]
    volumes:
      - "${OLLAMA_DATA_DIR:-./ollama-data}:/root/.ollama"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  # ── Python sidecars (SMTP / IMAP / Recording / Auth) ─────────────────────
  sidecars:
    image: jassemeldanaf/diyar-sidecars:latest
    build:
      context: .
      dockerfile: Dockerfile.sidecars
    restart: unless-stopped
    environment:
      SIDECAR_HOST: "0.0.0.0"
      # PostgreSQL (auth sidecar)
      PG_HOST:     postgres
      PG_PORT:     "5432"
      PG_USER:     ${POSTGRES_USER:-hr_admin}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-hr_pass}
      PG_DB:       ${POSTGRES_DB:-hr_automation}
      # SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # IMAP
      IMAP_HOST:     ${IMAP_HOST:-}
      IMAP_PORT:     ${IMAP_PORT:-993}
      IMAP_USER:     ${IMAP_USER:-}
      IMAP_PASS:     ${IMAP_PASS:-}
      IMAP_FOLDER:   ${IMAP_FOLDER:-INBOX}
      IMAP_POLL_SEC: ${IMAP_POLL_SEC:-60}
      N8N_INBOUND_URL: http://n8n:5678/webhook/inbound-email
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@diyarme.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin1234!}
    volumes:
      - recordings:/app/recordings
    ports:
      - "8901:8901"
      - "8902:8902"
      - "8903:8903"
      - "8904:8904"
    depends_on:
      postgres:
        condition: service_healthy

  # ── React frontend (nginx) ────────────────────────────────────────────────
  frontend:
    image: jassemeldanaf/diyar-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    # Lets nginx proxy /ollama/ → the host Ollama (GPU) for the in-app health check.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - n8n
      - sidecars

volumes:
  postgres_data:
  n8n_data:
  recordings:
